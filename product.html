<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Retail | Customer Hub</title>
    <!-- Tailwind CSS for modern, clean styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col justify-between">

    <!-- Top Navigation Bar Header -->
    <header class="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            
            <!-- Brand Logo & Name (Left) -->
            <a href="#" class="flex items-center gap-2 group">
                <!-- SVG Vector Logo (Apex Arrow/Chevron) -->
                <svg class="w-8 h-8 text-indigo-200 fill-current group-hover:text-white transition-colors" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 22h4l6-12 6 12h4L12 2zm0 6l3.5 7h-7L12 8z"/>
                </svg>
                <!-- Company Name -->
                <span class="text-xl font-extrabold tracking-tight uppercase bg-linear-to-r from-white to-indigo-200 bg-clip-text text-transparent">
                    JJ PLV
                </span>
            </a>

            <!-- Navigation Links (Right) -->
            <nav class="hidden md:flex items-center gap-6 text-sm font-medium">
                <a href="index.html" class="text-indigo-100 hover:text-white transition-colors">Home</a>
                <a href="product.html" class="text-indigo-100 hover:text-white transition-colors">Products</a>
                <a href="about.html" class="text-indigo-100 hover:text-white transition-colors">About Us</a>
                <a href="order.html" class="text-indigo-100 hover:text-white transition-colors">Order</a>
                <a href="contact.html" class="text-indigo-100 hover:text-white transition-colors">Contact Us</a>
                <!-- Active page highlight -->
                <a href="#" class="bg-indigo-700 text-white px-3 py-1.5 rounded-md shadow-inner border border-indigo-500/30">
                    Customer Hub
                </a>
            </nav>

            <!-- Simple Mobile Menu Button (Visible on small screens) -->
            <button class="md:hidden text-indigo-100 hover:text-white focus:outline-none" onclick="alert('In a live site, this would toggle a mobile menu drawer!')">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>

        </div>
    </header>

    <!-- Page Title Banner (Separated from the Main Nav Bar) -->
    <section class="bg-indigo-50 border-b border-indigo-100 py-6">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h1 class="text-2xl md:text-3xl font-bold text-indigo-900">Support & Ordering Portal</h1>
            <p class="text-indigo-600 mt-1 text-sm md:text-base">Select a tab below to quickly process your request.</p>
        </div>
    </section>

    <!-- Main Content Container -->
    <main class="max-w-3xl w-full mx-auto px-4 py-8 flex-grow">
        
        <!-- Tab Navigation -->
        <div class="flex border-b border-gray-200 mb-6 bg-white rounded-t-lg shadow-sm">
            <button onclick="switchTab('order')" id="tab-order" class="tab-btn flex-1 py-4 px-6 text-center font-medium text-indigo-600 border-b-2 border-indigo-600 focus:outline-none transition-all">
                📦 Place an Order
            </button>
            <button onclick="switchTab('feedback')" id="tab-feedback" class="tab-btn flex-1 py-4 px-6 text-center font-medium text-gray-500 hover:text-indigo-600 border-b-2 border-transparent focus:outline-none transition-all">
                ✨ Feedback
            </button>
            <button onclick="switchTab('enquiry')" id="tab-enquiry" class="tab-btn flex-1 py-4 px-6 text-center font-medium text-gray-500 hover:text-indigo-600 border-b-2 border-transparent focus:outline-none transition-all">
                ❓ General Enquiry
            </button>
        </div>

        <!-- Forms Container -->
        <div class="bg-white p-6 rounded-b-lg shadow-md">
            
            <!-- 1. ORDER FORM -->
            <div id="form-order" class="tab-content active">
                <h2 class="text-2xl font-semibold text-gray-800 mb-4">New Order Form</h2>
                <form onsubmit="handleOrderSubmit(event)">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">Full Name</label>
                            <input type="text" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
                            <input type="email" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                    </div>

                    <!-- Multiple Selection Checkboxes -->
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Select Products (Choose all that apply)</label>
                        <div class="space-y-2 bg-gray-50 p-3 rounded-md border border-gray-200">
                            <label class="flex items-center p-2 hover:bg-white rounded transition cursor-pointer">
                                <input type="checkbox" name="products" value="Premium Subscription ($19.99/mo)" class="w-4 h-4 rounded text-indigo-600 border-gray-300 focus:ring-indigo-500 mr-3">
                                <span class="text-gray-700 font-medium">Premium Subscription <span class="text-gray-400 text-sm">($19.99/mo)</span></span>
                            </label>
                            <label class="flex items-center p-2 hover:bg-white rounded transition cursor-pointer">
                                <input type="checkbox" name="products" value="Standard Subscription ($9.99/mo)" class="w-4 h-4 rounded text-indigo-600 border-gray-300 focus:ring-indigo-500 mr-3">
                                <span class="text-gray-700 font-medium">Standard Subscription <span class="text-gray-400 text-sm">($9.99/mo)</span></span>
                            </label>
                            <label class="flex items-center p-2 hover:bg-white rounded transition cursor-pointer">
                                <input type="checkbox" name="products" value="Hardware Starter Kit ($49.99)" class="w-4 h-4 rounded text-indigo-600 border-gray-300 focus:ring-indigo-500 mr-3">
                                <span class="text-gray-700 font-medium">Hardware Starter Kit <span class="text-gray-400 text-sm">($49.99)</span></span>
                            </label>
                        </div>
                        <p id="product-error" class="text-red-500 text-xs mt-1 hidden">Please select at least one product.</p>
                    </div>

                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Special Delivery Instructions</label>
                        <textarea rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Apartment code, drop-off preferences, etc."></textarea>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded-md hover:bg-indigo-700 transition">Submit Order</button>
                </form>
            </div>

            <!-- 2. FEEDBACK FORM -->
            <div id="form-feedback" class="tab-content">
                <h2 class="text-2xl font-semibold text-gray-800 mb-4">Share Your Feedback</h2>
                <form onsubmit="handleSubmit(event, 'Feedback')">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">How would you rate your experience?</label>
                        <div class="flex gap-4 my-2">
                            <label class="inline-flex items-center"><input type="radio" name="rating" value="5" class="mr-2" checked> 😍 Excellent</label>
                            <label class="inline-flex items-center"><input type="radio" name="rating" value="3" class="mr-2"> 😐 Average</label>
                            <label class="inline-flex items-center"><input type="radio" name="rating" value="1" class="mr-2"> 😞 Poor</label>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">What did you like or dislike the most?</label>
                        <textarea required rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Your feedback helps us grow..."></textarea>
                    </div>
                    <div class="mb-6">
                        <label class="inline-flex items-center">
                            <input type="checkbox" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500 mr-2">
                            <span class="text-sm text-gray-600">You can contact me publicly regarding this feedback if needed.</span>
                        </label>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-2 px-4 rounded-md hover:bg-emerald-700 transition">Submit Feedback</button>
                </form>
            </div>

            <!-- 3. ENQUIRY FORM -->
            <div id="form-enquiry" class="tab-content">
                <h2 class="text-2xl font-semibold text-gray-800 mb-4">Have a Question? Ask Us!</h2>
                <form onsubmit="handleSubmit(event, 'Enquiry')">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">Your Name</label>
                            <input type="text" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
                            <input type="email" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Subject</label>
                        <input type="text" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="e.g., Bulk pricing request, Technical issue">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Your Message</label>
                        <textarea required rows="5" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Provide as much detail as possible..."></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition">Send Enquiry</button>
                </form>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-400 text-center py-4 text-sm mt-8">
        <p>&copy; 2026 JJ PLV Inc. All rights reserved.</p>
    </footer>

    <!-- JavaScript Handling UI logic -->
    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('text-indigo-600', 'border-indigo-600');
                btn.classList.add('text-gray-500', 'border-transparent');
            });

            document.getElementById(`form-${tabName}`).classList.add('active');
            
            const activeBtn = document.getElementById(`tab-${tabName}`);
            activeBtn.classList.remove('text-gray-500', 'border-transparent');
            activeBtn.classList.add('text-indigo-600', 'border-indigo-600');
        }

        function handleOrderSubmit(event) {
            event.preventDefault();
            const checkedBoxes = document.querySelectorAll('input[name="products"]:checked');
            const selectedProducts = Array.from(checkedBoxes).map(cb => cb.value);
            const errorElement = document.getElementById('product-error');

            if (selectedProducts.length === 0) {
                errorElement.classList.remove('hidden');
                return;
            } else {
                errorElement.classList.add('hidden');
            }

            alert(`Thank you! Your order for:\n- ${selectedProducts.join('\n- ')}\nhas been successfully submitted to Apex Retail.`);
            event.target.reset();
        }

        function handleSubmit(event, formType) {
            event.preventDefault();
            alert(`Thank you! Your ${formType} has been successfully submitted to Apex Retail.`);
            event.target.reset();
        }
    </script>
</body>
</html>
